<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Đặt Lịch Y Tế</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center bg-[url('https://images.pexels.com/photos/1250655/pexels-photo-1250655.jpeg?auto=compress&cs=tinysrgb&w=2000')] bg-cover bg-center">
    <!-- Lớp phủ bóng mờ -->
    <div class="absolute inset-0 bg-blue-900/60"></div>
    
    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">Y-Tế<span class="text-slate-800">Số</span></h1>
            <p class="text-slate-600 font-medium">Đăng nhập tài khoản để tiếp tục</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Tài khoản (Tên đăng nhập)</label>
                <div class="relative">
                    <input type="text" id="username" class="w-full px-5 py-3 rounded-xl border-2 border-slate-200 focus:ring-0 focus:border-blue-500 outline-none transition-colors font-medium bg-white/70" placeholder="Nhập tên đăng nhập..." required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Mật khẩu</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full px-5 py-3 rounded-xl border-2 border-slate-200 focus:ring-0 focus:border-blue-500 outline-none transition-colors font-medium bg-white/70" placeholder="••••••••" required>
                </div>
                <div class="text-right mt-2 flex justify-between">
                    <a href="index.html" class="text-sm text-slate-500 hover:text-slate-700 underline">&larr; Về trang chủ</a>
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-800 font-bold">Quên mật khẩu?</a>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-blue-500/40 text-lg">
                Vào Hệ Thống
            </button>
        </form>
    </div>

    <!-- Kéo thư viện API -->
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            try {
                btn.innerHTML = 'Đang tự động chuyển hướng...';
                btn.disabled = true;
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Cắm chìa khóa (Token)
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    const role = result.user.role;
                    
                    // Cơ chế Chuyển Hướng Điều Phối Dòng Chảy (RBAC Router)
                    if (role === 'ADMIN') {
                        window.location.href = '/admin.html';
                    } else if (role === 'DOCTOR') {
                        window.location.href = '/doctor.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                    
                } else {
                    alert('Lỗi Đăng Nhập: ' + (result.message || result.error));
                }
            } catch (error) {
                alert('Mất mạng hoặc Máy chủ đang sập: ' + error.message);
            } finally {
                btn.innerHTML = 'Vào Hệ Thống';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
